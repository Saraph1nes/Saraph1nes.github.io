2</span><br><span class="line">363</span><br><span class="line">364</span><br><span class="line">365</span><br><span class="line">366</span><br><span class="line">367</span><br><span class="line">368</span><br><span class="line">369</span><br><span class="line">370</span><br><span class="line">371</span><br><span class="line">372</span><br><span class="line">373</span><br><span class="line">374</span><br><span class="line">375</span><br></pre></div></td><td class="code"><div class="hljs code-wrapper"><pre><code class="hljs mysql">1.<br>SELECT student.*,b.s_score as &#x27;课程1&#x27;,c.s_score as &#x27;课程2&#x27; FROM student<br>INNER JOIN score b ON student.s_id=b.s_id AND b.c_id=&#x27;01&#x27;<br>INNER JOIN score c ON student.s_id=c.s_id AND c.c_id=&#x27;02&#x27;<br>WHERE b.s_score&gt;c.s_score<br><br>2.<br>SELECT student.*,b.s_score as &#x27;课程1&#x27;,c.s_score as &#x27;课程2&#x27; FROM student<br>INNER JOIN score b ON b.s_id=student.s_id AND b.c_id=&#x27;01&#x27;<br>INNER JOIN score c ON c.s_id=student.s_id AND c.c_id=&#x27;02&#x27;<br>WHERE b.s_score&lt;c.s_score<br><br>3.<br>SELECT student.s_id,student.s_name,ROUND(AVG(score.s_score),2) AS avg_score<br>FROM student<br>INNER JOIN score ON score.s_id=student.s_id<br>GROUP BY student.s_id<br>HAVING avg_score &gt;= 60<br><br>4.<br>SELECT student.s_id,student.s_name,ROUND(AVG(IFNULL(score.s_score,0)),2) AS avg_score<br>FROM student<br>LEFT JOIN score ON score.s_id=student.s_id<br>GROUP BY student.s_id<br>HAVING avg_score &lt; 60<br>-----或者-----<br>SELECT student.s_id,student.s_name,ROUND(AVG(score.s_score),2) AS avg_score<br>FROM student<br>LEFT JOIN score ON score.s_id=student.s_id<br>GROUP BY student.s_id<br>HAVING avg_score &lt; 60 OR avg_score IS NULL<br><br>5.<br>SELECT student.s_id,student.s_name,COUNT(score.c_id) as &#x27;选课总数&#x27;,SUM(score.s_score) as &#x27;总成绩&#x27;<br>from student<br>LEFT JOIN score ON student.s_id=score.s_id<br>GROUP BY student.s_id,student.s_name<br><br>6.<br>SELECT COUNT(teacher.t_name) FROM teacher WHERE teacher.t_name LIKE &#x27;李%&#x27;<br><br>7.	<br>SELECT student.*,teacher.t_name,course.c_name FROM student<br>LEFT JOIN score on score.s_id = student.s_id<br>LEFT JOIN course on course.c_id = score.c_id<br>LEFT JOIN teacher ON  teacher.t_id = course.t_id<br>WHERE teacher.t_name = &#x27;张三&#x27;<br><br>8.<br>SELECT * FROM student<br>WHERE student.s_id not in(<br>	# 学生学过张三的课（上题得出）<br>	SELECT student.s_id FROM student<br>		LEFT JOIN score on score.s_id = student.s_id<br>		LEFT JOIN course on course.c_id = score.c_id<br>		LEFT JOIN teacher ON  teacher.t_id = course.t_id<br>		WHERE teacher.t_name = &#x27;张三&#x27;<br>)<br><br>9.<br>SELECT student.*,s1.s_score AS &#x27;01分数&#x27;,s2.s_score AS &#x27;02分数&#x27;<br>FROM student<br>LEFT JOIN score s1 ON s1.s_id = student.s_id<br>LEFT JOIN score s2 ON s2.s_id = student.s_id <br>WHERE s1.c_id = &#x27;01&#x27; AND s2.c_id = &#x27;02&#x27;<br><br>10.<br>SELECT student.*,s1.s_score AS &#x27;01分数&#x27;,s2.s_score AS &#x27;02分数&#x27;<br>FROM student<br>INNER JOIN score s1 ON s1.s_id = student.s_id AND s1.c_id = &#x27;01&#x27;<br>LEFT JOIN score s2 ON s2.s_id = student.s_id AND s2.c_id = &#x27;02&#x27;<br>WHERE s2.s_score IS NULL<br><br>11.<br>SELECT * FROM student<br>WHERE student.s_id IN (<br>	SELECT score.s_id FROM score GROUP BY score.s_id HAVING COUNT(score.s_score)&lt;3<br>)<br><br>12.<br>SELECT * FROM student WHERE student.s_id IN (<br>	SELECT DISTINCT score.s_id FROM score WHERE score.c_id IN(<br>		SELECT score.c_id FROM score WHERE score.s_id=&#x27;01&#x27;<br>	)<br>)<br><br>13.<br>SELECT * FROM student WHERE student.s_id IN (<br>	SELECT score.s_id FROM score WHERE score.c_id IN(<br>		SELECT score.c_id FROM score WHERE score.s_id=&#x27;01&#x27;<br>	)AND score.s_id != &#x27;01&#x27; GROUP BY score.s_id HAVING COUNT(score.c_id)&gt;=3<br>)<br><br>14.<br>SELECT * FROM student <br>WHERE student.s_id NOT IN(<br>	SELECT score.s_id FROM score<br>	INNER JOIN course ON course.c_id = score.c_id<br>	INNER JOIN teacher ON teacher.t_id = course.t_id<br>	WHERE teacher.t_name = &#x27;张三&#x27;<br>)<br><br>15.<br>SELECT student.s_id,student.s_name,AVG(score.s_score) AS AVG_SCORE FROM student<br>INNER JOIN score on student.s_id = score.s_id<br>WHERE student.s_id in (<br>	SELECT score.s_id FROM score WHERE score.s_score&lt;60<br>)<br>GROUP BY student.s_id<br><br>16.<br>SELECT student.*,score.s_score AS 01_score FROM student<br>INNER JOIN score ON student.s_id = score.s_id AND score.s_score&lt;60<br>WHERE score.c_id = &#x27;01&#x27;<br>ORDER BY 01_score DESC<br><br>17.<br>SELECT<br>	student.*,<br>	01_score.s_score AS 01_score,<br>	02_score.s_score AS 02_score,<br>	03_score.s_score AS 03_score,<br>	AVG( sc.s_score ) AS AVG_score <br>FROM<br>	student<br>	LEFT JOIN score 01_score ON student.s_id = 01_score.s_id <br>	AND 01_score.c_id = &#x27;01&#x27;<br>	LEFT JOIN score 02_score ON student.s_id = 02_score.s_id <br>	AND 02_score.c_id = &#x27;02&#x27;<br>	LEFT JOIN score 03_score ON student.s_id = 03_score.s_id <br>	AND 03_score.c_id = &#x27;03&#x27;<br>	LEFT JOIN score sc ON student.s_id = sc.s_id <br>GROUP BY<br>	student.s_id <br>ORDER BY<br>	AVG_score DESC<br>	<br>18.<br>SELECT<br>	score.c_id,<br>	course.c_name,<br>	MAX( score.s_score ) AS max_sc,<br>	MIN( score.s_score ) AS min_sc,<br>	AVG( score.s_score ) AS avg_sc <br>FROM<br>	score<br>	INNER JOIN course ON course.c_id = score.c_id <br>GROUP BY<br>	score.c_id<br><br>19.<br>SET @scrank = 0;<br>SELECT<br>	student.*,<br>	score.c_id,<br>	score.s_score,<br>	@scrank := @scrank + 1 AS sc_rank <br>FROM<br>	student<br>	INNER JOIN score ON score.s_id = student.s_id <br>ORDER BY<br>	score.c_id,<br>	score.s_score DESC<br><br>20.<br>SET @scrank = 0;<br>SELECT<br>	student.*,<br>	SUM( score.s_score ) AS sum_sc,<br>	@scrank := @scrank + 1 AS sc_rank <br>FROM<br>	student<br>	INNER JOIN score ON score.s_id = student.s_id <br>GROUP BY<br>	student.s_id <br>ORDER BY<br>	sum_sc DESC<br>	<br>21.<br>SELECT<br>	teacher.*,<br>	course.c_name,<br>	AVG( score.s_score ) AS avg_sc <br>FROM<br>	teacher<br>	LEFT JOIN course ON course.t_id = teacher.t_id<br>	LEFT JOIN score ON score.c_id = course.c_id <br>GROUP BY<br>	teacher.t_id,<br>	course.c_name <br>ORDER BY<br>	avg_sc DESC<br>	<br>22.<br>(SELECT st.*,sc.c_id,sc.s_score FROM score sc,student st WHERE sc.s_id = st.s_id AND sc.c_id = &#x27;01&#x27; ORDER BY sc.s_score DESC LIMIT 1,2)<br>UNION ALL<br>(SELECT st.*,sc.c_id,sc.s_score FROM score sc,student st WHERE sc.s_id = st.s_id AND sc.c_id = &#x27;02&#x27; ORDER BY sc.s_score DESC LIMIT 1,2)<br>UNION ALL<br>(SELECT st.*,sc.c_id,sc.s_score FROM score sc,student st WHERE sc.s_id = st.s_id AND sc.c_id = &#x27;03&#x27; ORDER BY sc.s_score DESC LIMIT 1,2)<br><br>23.<br>SELECT c.c_id,c.c_name <br>,((SELECT COUNT(*) FROM score sc WHERE sc.c_id=c.c_id AND sc.s_score&lt;=100 AND sc.s_score&gt;80)/(SELECT COUNT(*) FROM score sc WHERE sc.c_id=c.c_id )) &quot;100-85&quot;<br>,((SELECT COUNT(*) FROM score sc WHERE sc.c_id=c.c_id AND sc.s_score&lt;=85 AND sc.s_score&gt;70)/(SELECT COUNT(*) FROM score sc WHERE sc.c_id=c.c_id )) &quot;85-70&quot;<br>,((SELECT COUNT(*) FROM score sc WHERE sc.c_id=c.c_id AND sc.s_score&lt;=70 AND sc.s_score&gt;60)/(SELECT COUNT(*) FROM score sc WHERE sc.c_id=c.c_id )) &quot;70-60&quot;<br>,((SELECT COUNT(*) FROM score sc WHERE sc.c_id=c.c_id AND sc.s_score&lt;=60 AND sc.s_score&gt;=0)/(SELECT COUNT(*) FROM score sc WHERE sc.c_id=c.c_id )) &quot;60-0&quot;<br>FROM course c ORDER BY c.c_id<br><br>24.<br>SELECT<br>	student.s_id,<br>	student.s_name,<br>	ROUND(( CASE WHEN AVG( score.s_score ) IS NULL THEN 0 ELSE AVG( score.s_score ) END ), 2 ) AS avg_sc <br>FROM<br>	student<br>	INNER JOIN score ON score.s_id = student.s_id <br>GROUP BY<br>	score.s_id <br>ORDER BY<br>	avg_sc DESC<br>	<br>25.<br>SELECT<br>	sc1.* <br>FROM<br>	score sc1 <br>WHERE<br>	( SELECT COUNT(*) FROM score sc2 WHERE sc1.c_id = sc2.c_id AND sc1.s_score &lt; sc2.s_score )&lt; 3 <br>ORDER BY<br>	sc1.c_id,<br>	sc1.s_score DESC<br>	<br>26.<br>SELECT score.c_id,course.c_name,COUNT(score.s_id) AS stu_num FROM score,course<br>WHERE course.c_id = score.c_id<br>GROUP BY score.c_id<br><br>27.<br>SELECT student.s_id,student.s_name <br>FROM student<br>WHERE student.s_id IN (<br>	SELECT score.s_id FROM score <br>	GROUP BY score.s_id <br>	HAVING COUNT(score.s_id) =2 <br>)<br><br>28.<br>SELECT student.s_sex,COUNT(student.s_sex) FROM student GROUP BY student.s_sex<br><br>29.<br>SELECT student.* FROM student WHERE student.s_name LIKE &#x27;%风%&#x27;<br><br>30.<br># 为了重名，加一条学生信息<br># INSERT INTO `practice_test`.`student`(`s_id`, `s_name`, `s_birth`, `s_sex`) VALUES (&#x27;09&#x27;, &#x27;李云&#x27;, &#x27;1992-01-02&#x27;, &#x27;女&#x27;)<br># sql语句如下<br>SELECT student.s_name,COUNT(*) FROM student GROUP BY student.s_name HAVING COUNT(*)&gt;1<br><br>31.<br>SELECT student.* FROM student WHERE student.s_birth LIKE &#x27;1990%&#x27;<br><br>32.<br># 为了有平均分相同的情况，在分数表（score）中插入两条数据，<br># s_id  c_id  s_score<br># 08	04	  69<br># 09	04	  68<br>SELECT score.c_id,AVG(score.s_score) AS avg_sc FROM score GROUP BY score.c_id ORDER BY avg_sc DESC,c_id<br><br>33.<br>SELECT student.s_id,student.s_name,AVG(score.s_score) AS avg_sc FROM student<br>INNER JOIN score ON score.s_id=student.s_id<br>GROUP BY student.s_id<br>HAVING avg_sc &gt;=85<br><br>34.<br>SELECT student.s_name,score.s_score FROM student<br>INNER JOIN score ON score.s_id=student.s_id<br>INNER JOIN course ON course.c_id = score.c_id<br>WHERE score.s_score&lt;60 and course.c_name=&#x27;数学&#x27;<br><br>35.<br>SELECT student.s_name,course.c_name,score.s_score FROM student<br>INNER JOIN score ON score.s_id=student.s_id<br>INNER JOIN course ON course.c_id = score.c_id<br><br>36.<br>SELECT student.s_name,course.c_name,score.s_score FROM student<br>INNER JOIN score ON score.s_id=student.s_id<br>INNER JOIN course ON course.c_id = score.c_id<br>WHERE score.s_score&gt;70<br><br>37.<br>SELECT student.s_name,course.c_name,score.s_score FROM student<br>INNER JOIN score ON score.s_id=student.s_id<br>INNER JOIN course ON course.c_id = score.c_id<br>WHERE score.s_score&lt;60<br><br>38.<br>SELECT student.s_id,student.s_name,course.c_name,score.s_score FROM student<br>INNER JOIN score ON score.s_id=student.s_id<br>INNER JOIN course ON course.c_id = score.c_id<br>WHERE score.s_score&gt;=80 AND score.c_id = &#x27;01&#x27;<br><br>39.<br>SELECT course.c_name,COUNT(score.s_score) AS st_num FROM course<br>LEFT JOIN score ON score.c_id=course.c_id<br>GROUP BY course.c_id<br><br>40.<br>SELECT student.*,score.s_score,teacher.t_name FROM student<br>INNER JOIN score ON score.s_id=student.s_id<br>INNER JOIN course ON course.c_id = score.c_id<br>INNER JOIN teacher ON teacher.t_id = course.t_id<br>WHERE teacher.t_name = &#x27;张三&#x27;<br>ORDER BY score.s_score DESC<br>LIMIT 0,1<br><br>41.<br>SELECT st.s_id,st.s_name,sc.c_id,sc.s_score <br>FROM student st<br>LEFT JOIN score sc ON sc.s_id = st.s_id<br>LEFT JOIN course c ON c.c_id = sc.c_id <br>WHERE(<br>	SELECT COUNT( * ) <br>    FROM student st2<br>	LEFT JOIN score sc2 ON sc2.s_id = st2.s_id<br>	LEFT JOIN course c2 ON c2.c_id = sc2.c_id <br>	WHERE sc.s_score = sc2.s_score <br>	AND c.c_id &lt;&gt; c2.c_id <br>	)&gt;1<br>	<br>42.<br>SELECT a.* FROM score AS a<br>LEFT JOIN score as b<br>ON a.c_id = b.c_id AND a.s_score &lt; b.s_score # 列出同一门课内所有分数比较的情况<br>GROUP BY a.c_id, a.s_id<br>HAVING COUNT(b.c_id)&lt;=1 #他只比1个低，或者比0个低（即他就是第一）<br>ORDER BY a.c_id;<br><br>43.<br>SELECT score.c_id,COUNT(score.s_id) AS st_num FROM score<br>GROUP BY score.c_id<br>HAVING st_num&gt;5<br><br>44.<br>SELECT sc.s_id,COUNT(sc.s_score) count_sc FROM score sc<br>GROUP BY sc.s_id<br>HAVING count_sc&gt;=2<br><br>45.<br>SELECT student.* FROM student<br>WHERE student.s_id IN(<br>	SELECT sc.s_id FROM score sc<br>	GROUP BY sc.s_id<br>	HAVING COUNT(sc.s_score)&gt;2<br>)<br><br>46.<br>select *, TIMESTAMPDIFF(YEAR,student.s_birth,NOW()) as 年龄 from Student<br><br>47.<br>SELECT student.*,WEEK(student.s_birth),WEEK(NOW()) FROM student<br>WHERE WEEK(student.s_birth)=WEEK(N
